<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart - ShopOnCampus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/styles.css" />
  <style>
    .cart-page {
      background: #f7f8fa;
      min-height: 100vh;
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.3rem;
    }

    .cart-header p {
      margin-bottom: 0;
      color: #5f6b7a;
    }

    .cart-item-card,
    .cart-summary-card,
    .empty-cart-card {
      border: 0;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
    }

    .cart-item-card {
      overflow: hidden;
      border-left: 4px solid rgba(37, 99, 235, 0.45);
    }

    .cart-thumb {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #eef1f5;
    }

    .qty-btn {
      min-width: 46px;
      min-height: 46px;
      padding: 0;
      border-radius: 8px !important;
    }

    .qty-input {
      max-width: 56px;
      border-radius: 8px !important;
      font-weight: 600;
      background: #f8fafc;
    }

    .cart-item-price {
      color: #1e40af;
      font-weight: 700;
    }

    @media (max-width: 767px) {
      .cart-summary-card {
        margin-top: 1rem;
      }

      .cart-item-meta {
        margin-top: 0.75rem;
      }
    }
  </style>
</head>

<body class="cart-page">
  <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="../index.html">
        <img src="../assets/image.png" alt="ShopOnCampus logo" class="brand-logo" />
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="products.html">Products</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cart.html" id="cartNavLink"><i class="bi bi-cart3"></i> Cart
              <span id="cartCount" class="badge bg-danger">0</span></a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html" id="loginLink">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="signup.html" id="signupLink">Sign Up</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container my-5">
    <div class="cart-header">
      <h2 class="text-dark mb-0">
        <i class="bi bi-cart3"></i> Shopping Cart
      </h2>
      <p id="cartMeta">0 item(s) in your cart</p>
    </div>

    <div class="row">
      <div class="col-md-8">
        <div id="cartItems">
          <!-- Cart items will load here -->
        </div>
      </div>

      <div class="col-md-4">
        <div class="card cart-summary-card bg-white text-dark">
          <div class="card-body">
            <h4 class="mb-4">Order Summary</h4>
            <div class="d-flex justify-content-between mb-2">
              <span>Subtotal:</span>
              <span id="subtotal">₦0</span>
            </div>
            <div class="d-flex justify-content-between mb-2">
              <span>Delivery:</span>
              <span id="delivery">₦500</span>
            </div>
            <hr />
            <div class="d-flex justify-content-between mb-4">
              <strong>Total:</strong>
              <strong id="total" class="text-success">₦0</strong>
            </div>
            <button onclick="checkout()" class="btn btn-primary w-100 btn-lg">
              <i class="bi bi-check-circle"></i> Proceed to Checkout
            </button>
            <button onclick="clearCart()" class="btn btn-outline-secondary w-100 mt-2">
              <i class="bi bi-trash"></i> Clear Cart
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../data/products-data.js"></script>
  <script src="../data/price-overrides.js"></script>
  <script src="../js/main.js"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script>
    const renderCart = () => {
      const cartItems = document.getElementById("cartItems");
      const cartMeta = document.getElementById("cartMeta");
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);

      if (cartMeta) {
        cartMeta.textContent = `${totalItems} item(s) in your cart`;
      }

      if (cart.length === 0) {
        cartItems.innerHTML = `
                    <div class="card empty-cart-card bg-white text-center p-5">
                        <i class="bi bi-cart-x fs-1 mb-3"></i>
                        <h4>Your cart is empty</h4>
                        <p class="text-muted">Add some products to get started!</p>
                        <a href="products.html" class="btn btn-primary mt-3">Browse Products</a>
                    </div>
                `;
        updateSummary();
        return;
      }

      cartItems.innerHTML = cart
        .map(
          (item) => `
                <div class="card cart-item-card bg-white text-dark mb-3">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                  <img src="${item.image}" class="cart-thumb" alt="${item.name}"
                                      data-fallback-label="Item" data-fallback-width="100" data-fallback-height="100"
                                     >
                            </div>
                            <div class="col-md-4">
                                <h5>${item.name}</h5>
                                <p class="text-muted small mb-0">${item.description || "Campus product item"}</p>
                            </div>
                            <div class="col-md-2 cart-item-meta">
                                <p class="cart-item-price mb-0">₦${item.price.toLocaleString()}</p>
                            </div>
                            <div class="col-md-2 cart-item-meta">
                                <div class="input-group">
                                    <button class="btn btn-outline-secondary qty-btn" data-action="decrease" data-item-id="${item.id}">-</button>
                                    <input type="text" class="form-control text-center qty-input" value="${item.quantity}" readonly>
                                    <button class="btn btn-outline-secondary qty-btn" data-action="increase" data-item-id="${item.id}">+</button>
                                </div>
                            </div>
                            <div class="col-md-2 text-end cart-item-meta">
                                <p class="fw-bold mb-2">₦${(item.price * item.quantity).toLocaleString()}</p>
                                <button class="btn btn-sm btn-danger" data-action="remove" data-item-id="${item.id}">
                                    <i class="bi bi-trash"></i> Remove
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `,
        )
        .join("");

      const imageElements = cartItems.querySelectorAll(
        "img[data-fallback-label]",
      );
      imageElements.forEach((img) => {
        img.addEventListener(
          "error",
          () => {
            const label = img.getAttribute("data-fallback-label") || "Item";
            const width = Number(
              img.getAttribute("data-fallback-width") || 100,
            );
            const height = Number(
              img.getAttribute("data-fallback-height") || 100,
            );
            img.src = getFallbackImage(label, width, height);
          },
          { once: true },
        );
      });

      updateSummary();
    };

    const updateSummary = () => {
      const subtotal = getCartTotal();
      const delivery = cart.length > 0 ? 500 : 0;
      const total = subtotal + delivery;

      document.getElementById("subtotal").textContent =
        `₦${subtotal.toLocaleString()}`;
      document.getElementById("delivery").textContent =
        `₦${delivery.toLocaleString()}`;
      document.getElementById("total").textContent =
        `₦${total.toLocaleString()}`;
    };

    const changeQuantity = (id, newQty) => {
      updateQuantity(id, newQty);
      renderCart();
    };

    const removeItem = (id) => {
      removeFromCart(id);
      renderCart();
      showToast("Item removed from cart.", "info");
    };

    const cartItemsContainer = document.getElementById("cartItems");
    if (cartItemsContainer) {
      cartItemsContainer.addEventListener("click", (event) => {
        const actionButton = event.target.closest(
          "button[data-action][data-item-id]",
        );
        if (!actionButton) {
          return;
        }

        const itemId = Number(actionButton.getAttribute("data-item-id"));
        const action = actionButton.getAttribute("data-action");
        const currentItem = cart.find((entry) => entry.id === itemId);

        if (!itemId || !action) {
          return;
        }

        if (action === "decrease") {
          const currentQty = currentItem ? currentItem.quantity : 1;
          changeQuantity(itemId, currentQty - 1);
        } else if (action === "increase") {
          const currentQty = currentItem ? currentItem.quantity : 0;
          changeQuantity(itemId, currentQty + 1);
        } else if (action === "remove") {
          removeItem(itemId);
        }
      });
    }

    const clearCart = () => {
      if (cart.length === 0) {
        showToast("Your cart is already empty.", "info");
        return;
      }

      cart = [];
      localStorage.setItem("shoponcampus_cart", JSON.stringify(cart));
      renderCart();
      updateCartCount();
      showToast("Cart cleared.", "info");
    };

    const checkout = () => {
      const user = checkSession();
      if (!user) {
        showToast("Please login to checkout", "warning");
        window.location.href = "login.html";
        return;
      }

      if (cart.length === 0) {
        showToast("Your cart is empty!", "warning");
        return;
      }

      const totalAmount = getCartTotal() + 500;
      const paymentReference = `INSIDE-${Date.now()}`;
      const cartItemsCopy = [...cart];

      payWithPaystack({
        amount: totalAmount,
        email: user.email,
        reference: paymentReference,
        metadata: {
          custom_fields: [
            {
              display_name: "Customer Name",
              variable_name: "customer_name",
              value: user.name || "Student",
            },
            {
              display_name: "Cart Items",
              variable_name: "cart_items",
              value: `${cart.length}`,
            },
          ],
        },
        onSuccess: (response) => {
          showToast(
            `Payment successful! Total: ₦${totalAmount.toLocaleString()}`,
            "success",
          );

          createOrder(
            cartItemsCopy,
            totalAmount,
            user.email,
            user.name,
            user.email,
            paymentReference,
          );

          cart = [];
          localStorage.setItem("shoponcampus_cart", JSON.stringify(cart));
          updateCartCount();
          renderCart();
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1300);
        },
        onCancel: () => {
          showToast("Payment cancelled.", "info");
        },
      });
    };

    const activeUser = checkSession();
    if (!activeUser) {
      showToast("Please login to access your cart", "warning");
      setTimeout(() => {
        window.location.href = "login.html";
      }, 900);
    } else {
      renderCart();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
