<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - InsideLAUTECH</title>
    <link rel="icon" type="image/png"
        href="https://www.clipartmax.com/png/middle/258-2587546_%5Bgood-news%5D-lautech-resumes-on-15th-of-september-and-ladoke-akintola-university.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/signup.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-form-section">
            <div class="auth-form-container">
                <div class="text-center mb-4">
                    <img src="../assets/logo.png" alt="InsideLAUTECH logo" class="auth-logo mb-3">
                    <h2 class="form-title">Sign In</h2>
                    <p class="form-subtitle">Welcome back to InsideLAUTECH</p>
                </div>

                <form id="loginForm" class="auth-form">
                    <!-- Email Input -->
                    <div class="form-group mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="yourname@gmail.com"
                                autocomplete="email" required>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div class="form-group mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control with-toggle" id="password"
                                placeholder="Enter your password" autocomplete="current-password" required>
                            <button class="password-toggle" type="button" data-target="password"
                                aria-label="Show password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="attempt-hint" id="loginAttemptInfo"></small>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Keep me signed in on this device
                            </label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="signInBtn" class="btn btn-auth w-100 mb-3">
                        Sign In
                        <i class="bi bi-arrow-right ms-2"></i>
                    </button>

                    <!-- Sign Up Link -->
                    <div class="text-center mt-4">
                        <p class="signup-text">Don't have an account? <a href="signup.html" class="signup-link">Sign
                                Up</a></p>
                    </div>

                    <!-- Back to Home -->
                    <div class="text-center mt-3">
                        <a href="../index.html" class="back-home">
                            <i class="bi bi-arrow-left me-2"></i>
                            Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shared JS -->
    <script src="../js/main.js"></script>

    <!-- Bootstrap JS -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const MAX_LOGIN_ATTEMPTS = 5
            const LOCKOUT_MINUTES = 2
            const ATTEMPT_KEY = 'insidelautech_login_attempts'

            const activeSession = checkSession()
            if (activeSession) {
                window.location.href = 'dashboard.html'
                return
            }

            const form = document.getElementById('loginForm')
            const emailInput = document.getElementById('email')
            const passwordInput = document.getElementById('password')
            const rememberMe = document.getElementById('rememberMe')
            const forgotPasswordLink = document.querySelector('.forgot-password')
            const signInBtn = document.getElementById('signInBtn')
            const attemptInfo = document.getElementById('loginAttemptInfo')
            const passwordToggleButtons = document.querySelectorAll('.password-toggle')
            const nextPath = new URLSearchParams(window.location.search).get('next')

            const getAttemptState = () => {
                const raw = localStorage.getItem(ATTEMPT_KEY)
                if (!raw) {
                    return { count: 0, lockedUntil: null }
                }

                try {
                    const parsed = JSON.parse(raw)
                    return {
                        count: Number(parsed.count) || 0,
                        lockedUntil: parsed.lockedUntil || null
                    }
                } catch {
                    return { count: 0, lockedUntil: null }
                }
            }

            const setAttemptState = (state) => {
                localStorage.setItem(ATTEMPT_KEY, JSON.stringify(state))
            }

            const clearAttempts = () => {
                localStorage.removeItem(ATTEMPT_KEY)
                if (attemptInfo) {
                    attemptInfo.classList.remove('show')
                    attemptInfo.textContent = ''
                }
                if (signInBtn) {
                    signInBtn.disabled = false
                }
            }

            const updateLockoutState = () => {
                const state = getAttemptState()
                const now = Date.now()
                const lockedUntil = state.lockedUntil ? new Date(state.lockedUntil).getTime() : 0

                if (lockedUntil > now) {
                    const remainingSeconds = Math.ceil((lockedUntil - now) / 1000)
                    if (attemptInfo) {
                        attemptInfo.classList.add('show')
                        attemptInfo.textContent = `Too many failed attempts. Try again in ${remainingSeconds}s.`
                    }
                    if (signInBtn) {
                        signInBtn.disabled = true
                    }
                    return true
                }

                if (state.lockedUntil) {
                    clearAttempts()
                }

                return false
            }

            const registerFailedAttempt = () => {
                const state = getAttemptState()
                const newCount = state.count + 1

                if (newCount >= MAX_LOGIN_ATTEMPTS) {
                    const lockedUntil = new Date(Date.now() + (LOCKOUT_MINUTES * 60 * 1000)).toISOString()
                    setAttemptState({ count: newCount, lockedUntil })
                    updateLockoutState()
                    showToast('Too many failed attempts. Please wait before trying again.', 'error')
                    return
                }

                setAttemptState({ count: newCount, lockedUntil: null })
                const remaining = MAX_LOGIN_ATTEMPTS - newCount
                if (attemptInfo) {
                    attemptInfo.classList.add('show')
                    attemptInfo.textContent = `${remaining} attempt${remaining === 1 ? '' : 's'} remaining before temporary lock.`
                }
            }

            passwordToggleButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-target')
                    const input = document.getElementById(targetId)
                    if (!input) {
                        return
                    }

                    const isPassword = input.type === 'password'
                    input.type = isPassword ? 'text' : 'password'
                    btn.innerHTML = isPassword ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>'
                })
            })

            const remembered = localStorage.getItem('insidelautech_remembered_email') || localStorage.getItem('insideLAUTECH_rememberedEmail')
            if (remembered) {
                emailInput.value = remembered
                rememberMe.checked = true
            }

            if (forgotPasswordLink) {
                forgotPasswordLink.addEventListener('click', (event) => {
                    event.preventDefault()
                    showToast('Use your registered password for now. Reset flow can be added next.', 'info')
                })
            }

            updateLockoutState()

            const lockoutInterval = setInterval(() => {
                const locked = updateLockoutState()
                if (!locked) {
                    clearInterval(lockoutInterval)
                }
            }, 1000)

            form.addEventListener('submit', (e) => {
                e.preventDefault()

                if (updateLockoutState()) {
                    return
                }

                const normalizedEmail = emailInput.value.trim().toLowerCase()

                if (!normalizedEmail || !passwordInput.value) {
                    showToast('Please fill in all fields', 'warning')
                    return
                }

                let registeredUsers = []
                const stored = localStorage.getItem('insidelautechUsers')
                if (stored) {
                    registeredUsers = JSON.parse(stored)
                }

                let account = null
                for (let i = 0; i < registeredUsers.length; i++) {
                    if ((registeredUsers[i].email || '').trim().toLowerCase() === normalizedEmail) {
                        account = registeredUsers[i]
                        break
                    }
                }

                if (!account) {
                    showToast('No account found with this email. Please sign up first.', 'warning')
                    registerFailedAttempt()
                    return
                }

                if (account.password !== passwordInput.value) {
                    showToast('Incorrect password. Please try again.', 'error')
                    registerFailedAttempt()
                    return
                }

                clearAttempts()

                const session = {
                    email: account.email,
                    name: account.name,
                    phone: account.phone,
                    loggedIn: true,
                    loginTime: new Date().toISOString(),
                    lastLoginAt: new Date().toISOString()
                }

                localStorage.setItem('insidelautech_session', JSON.stringify(session))

                if (rememberMe.checked) {
                    localStorage.setItem('insidelautech_remembered_email', normalizedEmail)
                    localStorage.removeItem('insideLAUTECH_rememberedEmail')
                } else {
                    localStorage.removeItem('insidelautech_remembered_email')
                    localStorage.removeItem('insideLAUTECH_rememberedEmail')
                }

                showToast('Login successful! Welcome back.', 'success')
                setTimeout(() => {
                    if (nextPath && !nextPath.startsWith('http')) {
                        window.location.href = nextPath
                    } else {
                        window.location.href = 'dashboard.html'
                    }
                }, 1000)
            })
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
