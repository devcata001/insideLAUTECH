<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - ShopOnCampus</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../css/signup.css" />
</head>

<body>
  <div class="auth-container">
    <div class="auth-form-section">
      <div class="auth-form-container">
        <div class="text-center mb-4">
          <h2 class="form-title">Sign In</h2>
          <p class="form-subtitle">Welcome back to ShopOnCampus</p>
        </div>

        <form id="loginForm" class="auth-form">
          <!-- Email Input -->
          <div class="form-group mb-4">
            <label for="email" class="form-label">Email Address</label>
            <div class="input-group">
              <span class="input-icon">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" class="form-control" id="email" placeholder="yourname@gmail.com" autocomplete="email"
                required />
            </div>
          </div>

          <!-- Password Input -->
          <div class="form-group mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-icon">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" class="form-control with-toggle" id="password" placeholder="Enter your password"
                autocomplete="current-password" required />
              <button class="password-toggle" type="button" data-target="password" aria-label="Show password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <small class="attempt-hint" id="loginAttemptInfo"></small>
          </div>

          <!-- Remember Me & Forgot Password -->
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe" />
              <label class="form-check-label" for="rememberMe">
                Keep me signed in on this device
              </label>
            </div>
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="signInBtn" class="btn btn-auth w-100 mb-3">
            Sign In
            <i class="bi bi-arrow-right ms-2"></i>
          </button>

          <!-- Sign Up Link -->
          <div class="text-center mt-4">
            <p class="signup-text">
              Don't have an account?
              <a href="signup.html" class="signup-link">Sign Up</a>
            </p>
          </div>

          <!-- Back to Home -->
          <div class="text-center mt-3">
            <a href="../index.html" class="back-home">
              <i class="bi bi-arrow-left me-2"></i>
              Back to Home
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Shared JS -->
  <script src="../js/main.js"></script>
  <script src="../js/api-config.js"></script>
  <script src="../js/auth-login.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
