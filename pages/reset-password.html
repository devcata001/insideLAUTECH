<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - ShopOnCampus</title>
    <link rel="icon" type="image/png" href="../assets/image.png" />
    <link rel="stylesheet" href="../css/signup.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-form-section">
            <div class="auth-form-container">
                <div class="text-center mb-4">
                    <h2 class="form-title">Create New Password</h2>
                    <p class="form-subtitle">
                        Enter your new password below
                    </p>
                </div>

                <form id="resetPasswordForm" class="auth-form">
                    <!-- Password Input -->
                    <div class="form-group mb-3">
                        <label for="password" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control with-toggle" id="password"
                                placeholder="Create a strong password" autocomplete="new-password" required />
                            <button class="password-toggle" type="button" data-target="password"
                                aria-label="Show password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-muted">Use 8+ characters with uppercase, lowercase, and a
                            number.</small>
                    </div>

                    <!-- Confirm Password Input -->
                    <div class="form-group mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control with-toggle" id="confirmPassword"
                                placeholder="Confirm your password" autocomplete="new-password" required />
                            <button class="password-toggle" type="button" data-target="confirmPassword"
                                aria-label="Show confirm password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-muted" id="confirmPasswordHint">Re-enter your password
                            exactly.</small>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submitBtn" class="btn btn-auth w-100 mb-3">
                        Reset Password
                        <i class="bi bi-check-circle ms-2"></i>
                    </button>

                    <!-- Back to Login -->
                    <div class="text-center mt-4">
                        <p class="signup-text">
                            <a href="login.html" class="signup-link">Back to Login</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shared JS -->
    <script src="../js/main.js"></script>
    <script src="../js/api-config.js"></script>
    <script src="../js/auth-reset-password.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
