<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verification Pending - InsideLAUTECH</title>
    <link rel="icon" type="image/png" href="../assets/logo.png" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/signup.css" />
    <style>
        .verification-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .verification-card {
            max-width: 500px;
            width: 100%;
            padding: 3rem 2rem;
            border-radius: 16px;
            background: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .verification-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff8f00 0%, #ef6c00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }

        .verification-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1d29;
            margin-bottom: 1rem;
        }

        .verification-subtitle {
            font-size: 1.1rem;
            color: #5f6b7a;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .email-highlight {
            font-weight: 600;
            color: #c0a062;
            word-break: break-all;
        }

        .resend-section {
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }

        .resend-label {
            font-size: 0.95rem;
            color: #5f6b7a;
            margin-bottom: 1rem;
        }

        .btn-resend {
            background: linear-gradient(135deg, #c0a062 0%, #a68d5a 100%);
            color: white;
            border: none;
            padding: 0.75rem 2.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-resend:hover {
            background: linear-gradient(135deg, #a68d5a 0%, #8b7349 100%);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(192, 160, 98, 0.3);
        }

        .btn-resend:active {
            transform: translateY(0);
        }

        .btn-resend:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .cooldown-timer {
            font-size: 0.9rem;
            color: #dc3545;
            margin-top: 1rem;
        }

        .back-to-login {
            margin-top: 2rem;
        }

        .back-to-login a {
            color: #c0a062;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .back-to-login a:hover {
            color: #a68d5a;
            text-decoration: underline;
        }

        .check-email-hint {
            background: #f0f4f8;
            border-left: 4px solid #ff8f00;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: #333;
        }

        .check-email-hint i {
            color: #ff8f00;
            margin-right: 0.5rem;
        }

        @media (max-width: 576px) {
            .verification-card {
                padding: 2rem 1.5rem;
            }

            .verification-icon {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }

            .verification-title {
                font-size: 1.5rem;
            }

            .verification-subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="verification-container">
        <div class="verification-card">
            <div class="verification-icon">
                <i class="bi bi-envelope-check"></i>
            </div>

            <h2 class="verification-title">Email Verification Required</h2>

            <p class="verification-subtitle">
                We've sent a verification link to:
                <br />
                <span class="email-highlight" id="emailDisplay">your-email@example.com</span>
            </p>

            <div class="check-email-hint">
                <i class="bi bi-info-circle"></i>
                Check your inbox and click the verification link to activate your
                account.
            </div>

            <div class="resend-section">
                <p class="resend-label">Didn't receive the email?</p>
                <button type="button" class="btn-resend" id="resendBtn">
                    <i class="bi bi-arrow-clockwise"></i>
                    <span id="resendText">Resend Verification Email</span>
                </button>
                <div class="cooldown-timer" id="cooldownTimer"></div>
            </div>

            <div class="back-to-login">
                <p>
                    Already verified?
                    <a href="login.html"><i class="bi bi-arrow-right"></i> Back to Login</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Shared JS -->
    <script src="../js/main.js"></script>
    <script src="../js/api-config.js"></script>
    <script src="../js/auth-verification-pending.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
