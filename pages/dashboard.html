<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - InsideLAUTECH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .dashboard-page {
            background: #f8f9fb;
            min-height: 100vh;
        }

        .dashboard-sidebar,
        .dashboard-panel,
        .dashboard-stat {
            border: 0;
            border-radius: 16px;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.08);
            background: #fff;
        }

        .dashboard-sidebar .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5efe0 0%, #efe2c2 100%);
            color: #7f642e;
            margin-bottom: 0.85rem;
        }

        .dashboard-nav-btn {
            border: 1px solid #e8ebf0;
            background: #fff;
            color: #1a1d29;
            border-radius: 12px;
            padding: 0.65rem 0.8rem;
            text-align: left;
            font-weight: 600;
            transition: all 0.25s ease;
        }

        .dashboard-nav-btn:hover {
            border-color: #d7c291;
            transform: translateX(3px);
            color: #7f642e;
        }

        .dashboard-nav-btn.active {
            border-color: rgba(192, 160, 98, 0.5);
            background: rgba(192, 160, 98, 0.12);
            color: #7f642e;
        }

        .dashboard-panel .form-control {
            border-radius: 10px;
            border: 1px solid #e4e9f0;
            background: #f9fbfd;
        }

        .dashboard-stat {
            overflow: hidden;
        }

        .dashboard-stat .card-body {
            padding: 1.25rem;
        }

        .stat-title {
            color: #5f6b7a;
            font-size: 0.92rem;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 700;
            margin: 0;
            color: #1a1d29;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .stat-icon.primary {
            background: rgba(13, 110, 253, 0.12);
            color: #0d6efd;
        }

        @media (max-width: 767px) {
            .dashboard-page .container {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }
    </style>
</head>

<body class="dashboard-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <img src="../assets/lautech.png" alt="LAUTECH Logo" height="40" class="me-2">
                <span class="brand-text">InsideLAUTECH</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html">
                            <i class="bi bi-cart3"></i> Cart <span id="cartCount" class="badge bg-danger">0</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <button onclick="logout()" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-md-3">
                <div class="card dashboard-sidebar">
                    <div class="card-body text-center">
                        <div class="avatar mx-auto">
                            <i class="bi bi-person fs-3"></i>
                        </div>
                        <h5 id="userName" class="mb-1">User</h5>
                        <p class="text-muted small mb-3" id="userEmail">email@example.com</p>
                        <hr>
                        <div class="d-grid gap-2">
                            <button class="dashboard-nav-btn active" data-section="profile"
                                onclick="showSection('profile', this)">
                                <i class="bi bi-person"></i> Profile
                            </button>
                            <button class="dashboard-nav-btn" data-section="orders"
                                onclick="showSection('orders', this)">
                                <i class="bi bi-bag"></i> Orders
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <!-- Profile Section -->
                <div id="profileSection" class="section-content">
                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="card dashboard-stat h-100">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <p class="stat-title">Total Orders</p>
                                        <p id="totalOrders" class="stat-value">0</p>
                                    </div>
                                    <span class="stat-icon primary"><i class="bi bi-bag-check"></i></span>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card dashboard-stat h-100">
                                <div
                                    class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
                                    <div>
                                        <p class="stat-title mb-1">Quick Action</p>
                                        <p class="stat-value fs-4 mb-0">Shop Now</p>
                                    </div>
                                    <a href="products.html" class="btn btn-primary">
                                        <i class="bi bi-cart-plus"></i> Shop Now
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card dashboard-panel">
                        <div class="card-body">
                            <h4 class="mb-4"><i class="bi bi-person-circle"></i> Profile Information</h4>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="profileName" readonly>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="profileEmail" readonly>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">Phone</label>
                                    <input type="text" class="form-control" id="profilePhone" readonly>
                                </div>
                            </div>
                            <div class="alert alert-info" id="memberSince">
                                <i class="bi bi-info-circle"></i> Member since
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Orders Section -->
                <div id="ordersSection" class="section-content" style="display: none;">
                    <div class="card dashboard-panel">
                        <div class="card-body">
                            <h4 class="mb-4"><i class="bi bi-bag"></i> My Orders</h4>
                            <div class="text-center py-5">
                                <i class="bi bi-bag-x fs-1 text-muted"></i>
                                <p class="text-muted mt-3">No orders yet</p>
                                <a href="products.html" class="btn btn-primary">Start Shopping</a>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="../data/products-data.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const user = checkSession()
        if (!user) {
            showToast('Please login to access dashboard', 'warning')
            window.location.href = 'login.html'
        }

        document.getElementById('userName').textContent = user.name
        document.getElementById('userEmail').textContent = user.email
        document.getElementById('profileName').value = user.name
        document.getElementById('profileEmail').value = user.email
        document.getElementById('profilePhone').value = user.phone || 'Not provided'

        document.getElementById('memberSince').innerHTML = `
            <i class="bi bi-info-circle"></i> Member since ${new Date().toLocaleDateString()}
        `

        const showSection = (section) => {
            document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none')
            document.querySelectorAll('.dashboard-nav-btn').forEach(b => b.classList.remove('active'))

            if (section === 'profile') {
                document.getElementById('profileSection').style.display = 'block'
            } else if (section === 'orders') {
                document.getElementById('ordersSection').style.display = 'block'
            }

            const activeBtn = document.querySelector(`.dashboard-nav-btn[data-section="${section}"]`)
            if (activeBtn) {
                activeBtn.classList.add('active')
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
