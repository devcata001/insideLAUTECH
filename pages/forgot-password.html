<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - ShopOnCampus</title>
    <link rel="icon" type="image/png" href="../assets/image.png" />
    <link rel="stylesheet" href="../css/signup.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-form-section">
            <div class="auth-form-container">
                <div class="text-center mb-4">
                    <h2 class="form-title">Reset Your Password</h2>
                    <p class="form-subtitle">
                        Enter your email and we'll send you a link to reset your password
                    </p>
                </div>

                <form id="forgotPasswordForm" class="auth-form">
                    <!-- Email Input -->
                    <div class="form-group mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="yourname@gmail.com"
                                autocomplete="email" required />
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="resetBtn" class="btn btn-auth w-100 mb-3">
                        Send Reset Link
                        <i class="bi bi-arrow-right ms-2"></i>
                    </button>

                    <!-- Back to Login -->
                    <div class="text-center mt-4">
                        <p class="signup-text">
                            Remember your password?
                            <a href="login.html" class="signup-link">Back to Login</a>
                        </p>
                    </div>

                    <!-- Back to Home -->
                    <div class="text-center mt-3">
                        <a href="../index.html" class="back-home">
                            <i class="bi bi-arrow-left me-2"></i>
                            Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shared JS -->
    <script src="../js/main.js"></script>
    <script src="../js/api-config.js"></script>
    <script src="../js/auth-forgot-password.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
