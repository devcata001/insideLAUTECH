<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - InsideLAUTECH</title>
    <link rel="icon" type="image/png"
        href="https://www.clipartmax.com/png/middle/258-2587546_%5Bgood-news%5D-lautech-resumes-on-15th-of-september-and-ladoke-akintola-university.png">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/signup.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-form-section">
            <div class="auth-form-container">
                <div class="text-center mb-4">
                    <img src="../assets/logo.png" alt="InsideLAUTECH logo" class="auth-logo mb-3">
                    <h2 class="form-title">Create Account</h2>
                    <p class="form-subtitle">Create your InsideLAUTECH account</p>
                </div>

                <form id="signupForm" class="auth-form">
                    <!-- Full Name Input -->
                    <div class="form-group mb-3">
                        <label for="fullname" class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control" id="fullname" placeholder="Enter your full name"
                                autocomplete="name" required>
                        </div>
                    </div>

                    <!-- Email Input -->
                    <div class="form-group mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="yourname@gmail.com"
                                autocomplete="email" required>
                        </div>
                    </div>

                    <!-- Phone Number Input -->
                    <div class="form-group mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-telephone"></i>
                            </span>
                            <input type="tel" class="form-control" id="phone" placeholder="+234 800 000 0000" required>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div class="form-group mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control with-toggle" id="password"
                                placeholder="Create a strong password" autocomplete="new-password" required>
                            <button class="password-toggle" type="button" data-target="password"
                                aria-label="Show password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-muted">Use 8+ characters with uppercase, lowercase, and a
                            number.</small>
                    </div>

                    <!-- Confirm Password Input -->
                    <div class="form-group mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-icon">
                                <i class="bi bi-lock-fill"></i>
                            </span>
                            <input type="password" class="form-control with-toggle" id="confirmPassword"
                                placeholder="Confirm your password" autocomplete="new-password" required>
                            <button class="password-toggle" type="button" data-target="confirmPassword"
                                aria-label="Show confirm password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                        <small class="form-text text-muted" id="confirmPasswordHint">Re-enter your password
                            exactly.</small>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label" for="terms">
                            I agree to the <a href="#" class="terms-link">Terms & Conditions</a> and <a href="#"
                                class="terms-link">Privacy Policy</a>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-auth w-100 mb-3">
                        Create Account
                        <i class="bi bi-arrow-right ms-2"></i>
                    </button>

                    <!-- Sign In Link -->
                    <div class="text-center mt-4">
                        <p class="signup-text">Already have an account? <a href="login.html" class="signup-link">Sign
                                In</a></p>
                    </div>

                    <!-- Back to Home -->
                    <div class="text-center mt-3">
                        <a href="../index.html" class="back-home">
                            <i class="bi bi-arrow-left me-2"></i>
                            Back to Home
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Shared JS -->
    <script src="../js/main.js"></script>

    <!-- Project JS -->
    <script src="../js/script.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
